<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="Interactive map of Child and Adult Care Food Program (CACFP) centers in Texas. Search and locate daycares near you.">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CACFP Centers in Texas (2024-2025)">
    <meta name="twitter:description" content="Interactive map of 345+ Child and Adult Care Food Program centers across Texas. Find daycares near you.">
    <meta name="twitter:image" content="https://your-domain.com/cacfp-map-preview.jpg">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="CACFP Centers in Texas (2024-2025)">
    <meta property="og:description" content="Interactive map of 345+ Child and Adult Care Food Program centers across Texas. Find daycares near you.">
    <meta property="og:image" content="https://your-domain.com/cacfp-map-preview.jpg">
    <meta property="og:url" content="https://your-domain.com/">
    
    <!-- Apple Touch Icon -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Texas Daycares">
    
    <title>CACFP Centers in Texas (2024-2025)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Child and Adult Care Food Program Centers in Texas</h1>
        <p class="subtitle">2024-2025 • Data source: <a href="https://data.texas.gov/dataset/Child-and-Adult-Care-Food-Programs-CACFP-Centers-S/mjnz-xwcy/about_data" target="_blank" rel="noopener">Texas Department of Agriculture</a></p>
    </header>
    
    <div id="search-container">
        <div class="search-wrapper">
            <input 
                type="text" 
                id="daycare-search" 
                placeholder="Search daycares by name..." 
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                inputmode="search"
            >
            <button id="clear-search" type="button" aria-label="Clear search">×</button>
        </div>
        <div id="search-results"></div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
